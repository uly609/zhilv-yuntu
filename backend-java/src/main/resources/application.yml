server:
  port: 8000

spring:
  application:
    name: zhilv-yuntu-java
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

zhilv:
  llm:
    provider: ${LLM_PROVIDER:openai_compatible}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:qwen-max}
    base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    timeout-seconds: ${LLM_TIMEOUT_SECONDS:60}
    max-retries: ${LLM_MAX_RETRIES:1}
